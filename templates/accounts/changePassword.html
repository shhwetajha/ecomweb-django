{% extends 'base.html' %}

{% block content %}

<section class="section-conten padding-y bg">
    
    {% include 'includes/alerts.html' %}
    <div class="container">
        <div class="row">
            {% include 'includes/dashboard_sidebar.html' %}
        <main class="col-md-9">
            <article class="card">
            <header class="card-header">
                <strong class="d-inline-block mr-3">Change Password</strong>
                
            </header>
            <div class="card-body">
                <div class="row">
            <div class="col-md-12">
              <form method='POST' action="{% url 'changepassword' %}">
                {% csrf_token %}
                
                <div class="form-group">
                  <label>Current Password</label>
                  <input type="password" name="current_password" placeholder=" Enter Your Current Password" class="form-control">
                </div>

                <div class="form-group">
                  <label>Password</label>
                 <input type="password" name="password" placeholder=" Enter Your Password" class="form-control">
                </div>
                  <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm password" placeholder="Enter Your Confirm Password" class="form-control">

                  </div>
                <input type="submit" class="btn btn-primary">

              </form>
               
               
            </div>
           
            </article> <!-- order-group.// --> 
        </main>
    </div> <!-- row.// -->
    </div>
</div>

</div>
    
    </section>

{% endblock %}
